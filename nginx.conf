server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed Vite assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Same-origin API proxy ─────────────────────────────────────────────────
    # Forwards /api to the backend so the SPA and API share one origin (no CORS,
    # and the refresh cookie may use SameSite=Strict). Delete this block if you
    # deploy the backend on a separate domain.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (socket.io) proxy ───────────────────────────────────────────
    # The Upgrade/Connection headers are required for the WS handshake — the
    # frontend now uses websocket-only transport, so this is mandatory.
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
