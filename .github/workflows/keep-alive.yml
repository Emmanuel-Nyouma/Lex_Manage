name: Keep backend awake

# Pings the Render health endpoint so the free-tier service never sleeps
# (Render spins down after 15 min idle; cold start then takes 30-60s).
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS --max-time 90 https://lexmanage-api.onrender.com/health
